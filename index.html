
<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>CineTicket - Pemesanan Tiket Bioskop</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
    }

    body {
      background: linear-gradient(145deg, #0b0f1c 0%, #101624 100%);
      min-height: 100vh;
      padding: 2rem 1.5rem;
    }

    /* Container utama */
    .cinema-container {
      max-width: 1400px;
      margin: 0 auto;
      background: rgba(18, 24, 34, 0.75);
      backdrop-filter: blur(2px);
      border-radius: 2.5rem;
      box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.05);
      padding: 1.8rem;
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    /* Header */
    .header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .header h1 {
      font-size: 2.5rem;
      font-weight: 700;
      background: linear-gradient(135deg, #FFD966, #F4C542, #E5B83C);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      letter-spacing: -0.5px;
      text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2);
    }

    .header p {
      color: #9aa6b9;
      margin-top: 0.5rem;
      font-weight: 500;
    }

    /* layout 2 kolom */
    .booking-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 2rem;
    }

    /* panel kiri: film, jadwal, denah kursi */
    .left-panel {
      flex: 2;
      min-width: 280px;
    }

    /* panel kanan: ringkasan & data pemesan */
    .right-panel {
      flex: 1.2;
      min-width: 280px;
      background: rgba(10, 14, 23, 0.7);
      border-radius: 1.8rem;
      padding: 1.5rem;
      backdrop-filter: blur(4px);
      border: 1px solid rgba(255, 255, 255, 0.05);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
    }

    /* card style */
    .card {
      background: #11161f;
      border-radius: 1.5rem;
      padding: 1.2rem 1.5rem;
      margin-bottom: 1.8rem;
      border: 1px solid #2a2f3c;
      transition: all 0.2s;
    }

    .card-title {
      font-size: 1.25rem;
      font-weight: 600;
      margin-bottom: 1rem;
      color: #FFDE9C;
      border-left: 4px solid #F4B836;
      padding-left: 12px;
      letter-spacing: -0.2px;
    }

    /* select & form */
    select, input {
      width: 100%;
      background: #1E2532;
      border: 1px solid #323a48;
      padding: 12px 16px;
      border-radius: 1rem;
      color: #f0f3fa;
      font-size: 0.95rem;
      font-weight: 500;
      outline: none;
      transition: 0.2s;
      cursor: pointer;
    }

    select:focus, input:focus {
      border-color: #F4B836;
      box-shadow: 0 0 0 2px rgba(244, 184, 54, 0.2);
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-size: 0.8rem;
      font-weight: 600;
      color: #b9c3db;
      letter-spacing: 0.3px;
    }

    .form-group {
      margin-bottom: 1.2rem;
    }

    /* Denah kursi */
    .screen {
      background: #232a36;
      text-align: center;
      padding: 8px 0;
      border-radius: 30px;
      margin: 20px 0 20px 0;
      font-weight: bold;
      color: #ddd;
      letter-spacing: 4px;
      font-size: 0.85rem;
      box-shadow: inset 0 1px 4px #00000030, 0 2px 6px rgba(0,0,0,0.3);
      text-transform: uppercase;
    }

    .seat-map-wrapper {
      overflow-x: auto;
      padding: 5px 0 10px 0;
    }

    .seat-map {
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-width: 500px;
    }

    /* header kolom (1-8) */
    .col-header {
      display: flex;
      margin-left: 38px;
      gap: 8px;
      margin-bottom: 8px;
    }
    .col-header .col-num {
      width: 44px;
      text-align: center;
      font-size: 13px;
      font-weight: bold;
      color: #8e9bb5;
    }

    /* setiap baris kursi */
    .seat-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .row-label {
      width: 38px;
      font-weight: 700;
      color: #FFD966;
      background: #1a202c;
      border-radius: 12px;
      text-align: center;
      padding: 6px 0;
      font-size: 0.9rem;
    }
    .seats {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .seat {
      width: 44px;
      height: 44px;
      background: #2C3546;
      border-radius: 16px 16px 12px 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
      font-weight: bold;
      color: #cfdbf5;
      cursor: pointer;
      transition: 0.1s linear;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.3);
      border-bottom: 3px solid #1f2532;
    }
    /* status kursi */
    .seat.available {
      background: #2b6e4c;
      background: linear-gradient(145deg, #2b804e, #1f6a3f);
      color: white;
      border-bottom-color: #0f4429;
    }
    .seat.selected {
      background: linear-gradient(145deg, #F4B836, #E09D1E);
      color: #1e1b13;
      border-bottom-color: #b47c10;
      box-shadow: 0 0 0 2px rgba(244,184,54,0.5);
      font-weight: bold;
    }
    .seat.booked {
      background: #4a3b2c;
      background: linear-gradient(145deg, #4f3e2c, #3c2e1f);
      color: #8f7a60;
      cursor: not-allowed;
      border-bottom-color: #2d241a;
      text-decoration: line-through;
      filter: grayscale(0.2);
    }
    .seat.available:hover {
      transform: scale(1.03);
      background: #3c9e62;
      box-shadow: 0 0 6px #70e6a0;
    }

    /* legenda */
    .legend {
      display: flex;
      gap: 20px;
      margin-top: 20px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.7rem;
      color: #bfc9e0;
    }
    .legend-box {
      width: 24px;
      height: 24px;
      border-radius: 8px;
    }

    /* ringkasan */
    .summary-line {
      display: flex;
      justify-content: space-between;
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 1px dashed #2a3140;
      font-size: 0.9rem;
    }
    .summary-total {
      font-size: 1.4rem;
      font-weight: bold;
      color: #FFD966;
      margin: 12px 0;
    }
    .selected-seats-list {
      background: #0e121b;
      border-radius: 12px;
      padding: 10px;
      font-size: 0.8rem;
      max-height: 100px;
      overflow-y: auto;
      color: #cbd5f0;
      word-break: break-all;
    }
    button {
      background: #F4B836;
      border: none;
      padding: 12px 20px;
      border-radius: 2rem;
      font-weight: 700;
      font-size: 1rem;
      color: #1F1A0C;
      cursor: pointer;
      transition: 0.2s;
      width: 100%;
      margin-top: 10px;
      box-shadow: 0 5px 0 #b47c10;
    }
    button:active {
      transform: translateY(2px);
      box-shadow: 0 2px 0 #b47c10;
    }
    .btn-secondary {
      background: #2f3a4b;
      box-shadow: 0 4px 0 #1b222e;
      color: #f2e8cf;
      margin-top: 8px;
    }
    .btn-secondary:active {
      transform: translateY(2px);
    }
    hr {
      border-color: #2a3140;
      margin: 15px 0;
    }
    @media (max-width: 780px) {
      body { padding: 1rem; }
      .cinema-container { padding: 1rem; }
      .seat { width: 36px; height: 36px; font-size: 0.6rem; }
      .col-header .col-num { width: 36px; }
    }
  </style>
</head>
<body>
<div class="cinema-container">
  <div class="header">
    <h1>🎬 CineTicket</h1>
    <p>Pesan tikus bioskop favoritmu | Pilih kursi & jadwal</p>
  </div>

  <div class="booking-grid">
    <!-- Panel Kiri: Pilihan Film, Jadwal, dan Denah Kursi -->
    <div class="left-panel">
      <div class="card">
        <div class="card-title">🎞️ Pilih Film & Jadwal</div>
        <div class="form-group">
          <label>🎥 Film</label>
          <select id="movieSelect">
            <option value="50000" data-title="Avengers: Endgame">Avengers: Endgame - Rp50.000</option>
            <option value="55000" data-title="Dune: Part Two">Dune: Part Two - Rp55.000</option>
            <option value="45000" data-title="Spider-Man: No Way Home">Spider-Man: No Way Home - Rp45.000</option>
            <option value="60000" data-title="Oppenheimer">Oppenheimer - Rp60.000</option>
          </select>
        </div>
        <div class="form-group">
          <label>⏰ Jadwal Tayang</label>
          <select id="scheduleSelect">
            <option value="10:30">10:30 WIB</option>
            <option value="13:45">13:45 WIB</option>
            <option value="16:00" selected>16:00 WIB</option>
            <option value="19:30">19:30 WIB</option>
            <option value="22:15">22:15 WIB</option>
          </select>
        </div>
      </div>

      <div class="card">
        <div class="card-title">🎟️ Pilih Kursi Anda</div>
        <div class="screen"> 📽️ L A Y A R   B I O S K O P 🎞️</div>
        <div class="seat-map-wrapper">
          <div class="col-header" id="colHeader"></div>
          <div id="seatMapContainer" class="seat-map"></div>
        </div>
        <div class="legend">
          <div class="legend-item"><div class="legend-box" style="background:#2b6e4c;"></div> Tersedia</div>
          <div class="legend-item"><div class="legend-box" style="background:#F4B836;"></div> Dipilih</div>
          <div class="legend-item"><div class="legend-box" style="background:#4a3b2c;"></div> Terisi</div>
        </div>
      </div>
    </div>

    <!-- Panel Kanan: Ringkasan & Data Pemesan -->
    <div class="right-panel">
      <div class="card-title">📋 Ringkasan Pesanan</div>
      <div id="summaryArea">
        <div class="summary-line"><span>🎬 Film:</span><span id="movieTitle">Avengers: Endgame</span></div>
        <div class="summary-line"><span>⏱️ Jadwal:</span><span id="showTime">16:00 WIB</span></div>
        <div class="summary-line"><span>💺 Kursi dipilih:</span><span id="selectedCount">0</span></div>
        <div class="selected-seats-list" id="selectedSeatsList">-</div>
        <div class="summary-total" id="totalPriceDisplay">Rp0</div>
      </div>
      
      <div class="form-group">
        <label>👤 Nama Pemesan</label>
        <input type="text" id="customerName" placeholder="Nama lengkap" value="Bagus Santoso">
      </div>
      <div class="form-group">
        <label>📧 Email (opsional)</label>
        <input type="email" id="customerEmail" placeholder="email@contoh.com">
      </div>
      
      <button id="confirmBookingBtn">✨ Pesan Tiket Sekarang ✨</button>
      <button id="resetSeatsBtn" class="btn-secondary">↺ Reset Pilihan Kursi</button>
    </div>
  </div>
</div>

<script>
  // ---------- DATA KONFIGURASI KURSI ----------
  const ROWS = ['A', 'B', 'C', 'D', 'E', 'F'];
  const COLUMNS = 8;  // 1-8
  // Kursi yang sudah dipesan (booked) - contoh beberapa kursi tidak tersedia
  const INIT_BOOKED = ['A3', 'B5', 'C2', 'D7', 'E4', 'F6', 'B8', 'C6', 'E1', 'F3'];
  
  // State global
  let bookedSeats = [...INIT_BOOKED];       // array string ID kursi (ex: "A3")
  let selectedSeats = [];                   // kursi yang dipilih user
  
  // DOM elements
  const movieSelect = document.getElementById('movieSelect');
  const scheduleSelect = document.getElementById('scheduleSelect');
  const seatMapContainer = document.getElementById('seatMapContainer');
  const colHeader = document.getElementById('colHeader');
  const movieTitleSpan = document.getElementById('movieTitle');
  const showTimeSpan = document.getElementById('showTime');
  const selectedCountSpan = document.getElementById('selectedCount');
  const selectedSeatsListDiv = document.getElementById('selectedSeatsList');
  const totalPriceDisplay = document.getElementById('totalPriceDisplay');
  const confirmBtn = document.getElementById('confirmBookingBtn');
  const resetSeatsBtn = document.getElementById('resetSeatsBtn');
  const customerNameInput = document.getElementById('customerName');
  const customerEmailInput = document.getElementById('customerEmail');
  
  // Helper: Mendapatkan harga film saat ini
  function getCurrentMoviePrice() {
    return parseInt(movieSelect.value, 10);
  }
  
  // Helper: Judul film (berdasarkan option yang dipilih)
  function getCurrentMovieTitle() {
    return movieSelect.options[movieSelect.selectedIndex].getAttribute('data-title') || movieSelect.options[movieSelect.selectedIndex].text.split('-')[0].trim();
  }
  
  // Helper: Jadwal yang dipilih
  function getCurrentSchedule() {
    return scheduleSelect.value + ' WIB';
  }
  
  // Update ringkasan: jumlah kursi, total harga, daftar kursi, film, jadwal
  function updateSummary() {
    const movie = getCurrentMovieTitle();
    const schedule = getCurrentSchedule();
    const price = getCurrentMoviePrice();
    const count = selectedSeats.length;
    const total = price * count;
    
    movieTitleSpan.innerText = movie;
    showTimeSpan.innerText = schedule;
    selectedCountSpan.innerText = count;
    
    if (count === 0) {
      selectedSeatsListDiv.innerHTML = '-';
    } else {
      // urutkan kursi secara alami (A1, A2, ...)
      const sorted = [...selectedSeats].sort((a,b) => {
        const rowA = a.charCodeAt(0);
        const rowB = b.charCodeAt(0);
        if (rowA !== rowB) return rowA - rowB;
        const numA = parseInt(a.slice(1), 10);
        const numB = parseInt(b.slice(1), 10);
        return numA - numB;
      });
      selectedSeatsListDiv.innerHTML = sorted.join(', ');
    }
    totalPriceDisplay.innerText = `Rp${total.toLocaleString('id-ID')}`;
  }
  
  // Render denah kursi berdasarkan state (bookedSeats & selectedSeats)
  function renderSeatMap() {
    // Generate header kolom (1 sampai 8)
    colHeader.innerHTML = '';
    const dummyDiv = document.createElement('div');
    dummyDiv.style.width = '38px'; // placeholder untuk label baris
    colHeader.appendChild(dummyDiv);
    for (let i = 1; i <= COLUMNS; i++) {
      const colNum = document.createElement('div');
      colNum.className = 'col-num';
      colNum.innerText = i;
      colHeader.appendChild(colNum);
    }
    
    seatMapContainer.innerHTML = ''; // bersihkan peta
    // Loop setiap baris
    for (let r of ROWS) {
      const rowDiv = document.createElement('div');
      rowDiv.className = 'seat-row';
      
      // Label baris (A, B, C...)
      const rowLabel = document.createElement('div');
      rowLabel.className = 'row-label';
      rowLabel.innerText = r;
      rowDiv.appendChild(rowLabel);
      
      const seatsDiv = document.createElement('div');
      seatsDiv.className = 'seats';
      
      for (let col = 1; col <= COLUMNS; col++) {
        const seatId = `${r}${col}`;
        const seatDiv = document.createElement('div');
        seatDiv.className = 'seat';
        
        // Tentukan status kursi
        if (bookedSeats.includes(seatId)) {
          seatDiv.classList.add('booked');
          seatDiv.innerText = '✕';
        } else if (selectedSeats.includes(seatId)) {
          seatDiv.classList.add('selected');
          seatDiv.innerText = '✓';
        } else {
          seatDiv.classList.add('available');
          seatDiv.innerText = `${col}`;
        }
        
        // Event listener klik
        seatDiv.addEventListener('click', (function(id, isBooked) {
          return function() {
            if (isBooked) {
              // kursi tidak bisa dipilih
              return;
            }
            // Toggle selected
            const index = selectedSeats.indexOf(id);
            if (index === -1) {
              selectedSeats.push(id);
            } else {
              selectedSeats.splice(index, 1);
            }
            // Re-render peta kursi & update ringkasan
            renderSeatMap();
            updateSummary();
          };
        })(seatId, bookedSeats.includes(seatId)));
        
        seatsDiv.appendChild(seatDiv);
      }
      rowDiv.appendChild(seatsDiv);
      seatMapContainer.appendChild(rowDiv);
    }
  }
  
  // Reset semua pilihan kursi
  function resetSelectedSeats() {
    selectedSeats = [];
    renderSeatMap();
    updateSummary();
  }
  
  // Event ketika film atau jadwal berubah -> update ringkasan (tidak reset kursi)
  function handleMovieOrScheduleChange() {
    updateSummary();
    // tidak mereset kursi agar pengguna bisa tetap mempertahankan pilihan meskipun ganti film (lebih fleksibel)
    // Tetapi memudahkan jika user ingin ganti film tanpa kehilangan kursi pilihannya.
    // Tersedia tombol reset manual.
  }
  
  // Validasi dan proses pemesanan
  function processBooking() {
    const name = customerNameInput.value.trim();
    if (name === "") {
      alert("❌ Mohon masukkan nama pemesan terlebih dahulu.");
      return;
    }
    if (selectedSeats.length === 0) {
      alert("🎫 Silakan pilih minimal satu kursi untuk melanjutkan pemesanan.");
      return;
    }
    
    const movie = getCurrentMovieTitle();
    const schedule = getCurrentSchedule();
    const price = getCurrentMoviePrice();
    const total = price * selectedSeats.length;
    const seatsStr = selectedSeats.sort().join(', ');
    const email = customerEmailInput.value.trim() || "(tidak diisi)";
    
    // Konfirmasi pesan via alert (simulasi sukses)
    const message = `🎉 PEMESANAN BERHASIL 🎉\n\n` +
      `Nama: ${name}\nEmail: ${email}\nFilm: ${movie}\nJadwal: ${schedule}\nKursi: ${seatsStr}\n` +
      `Jumlah tiket: ${selectedSeats.length}\nTotal harga: Rp${total.toLocaleString('id-ID')}\n\n` +
      `Terima kasih! Selamat menonton di CineTicket.`;
    alert(message);
    
    // optional: setelah pemesanan sukses, bisa reset kursi? biarkan user memutuskan dengan reset manual
    // agar tidak membingungkan, kami hanya menampilkan alert, tidak mereset otomatis.
  }
  
  // Inisialisasi: generate grid, event listener
  function init() {
    renderSeatMap();
    updateSummary();
    
    // event change untuk movie dan jadwal
    movieSelect.addEventListener('change', () => {
      handleMovieOrScheduleChange();
    });
    scheduleSelect.addEventListener('change', () => {
      handleMovieOrScheduleChange();
    });
    resetSeatsBtn.addEventListener('click', resetSelectedSeats);
    confirmBtn.addEventListener('click', processBooking);
  }
  
  // jalankan init setelah DOM siap
  document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
```
